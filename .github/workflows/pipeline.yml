name: DevSecOps Pipeline

on:
  push:
    branches:
      - main

jobs:

  security-build-deploy:
    runs-on: ubuntu-latest

    steps:

    # CHECKOUT CODE
    - name: Checkout Code
      uses: actions/checkout@v3

    # SETUP PYTHON
    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    # INSTALL DEPENDENCIES
    - name: Install Dependencies
      run: |
        pip install -r app/requirements.txt

    # SECRET SCAN
    - name: Install Gitleaks
      run: |
        wget https://github.com/gitleaks/gitleaks/releases/download/v8.18.1/gitleaks_8.18.1_linux_x64.tar.gz
        tar -xzf gitleaks_8.18.1_linux_x64.tar.gz
        sudo mv gitleaks /usr/local/bin/

    - name: Run Gitleaks Scan
      run: |
        gitleaks detect --source . --verbose

    # BUILD DOCKER IMAGE
    - name: Build Docker Image
      run: |
        cd app
        docker build -t flask-devsecops-app .

    # CONTAINER SCAN
    - name: Run Trivy Scan
      uses: aquasecurity/trivy-action@master
      with:
        image-ref: 'flask-devsecops-app'

    # IaC SCAN
    - name: Run Checkov
      uses: bridgecrewio/checkov-action@master
      with:
        directory: terraform/

    # DOCKER LOGIN
    - name: DockerHub Login
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_PASSWORD }}

    # TAG IMAGE
    - name: Tag Docker Image
      run: |
        docker tag flask-devsecops-app shreyashishree17/flask-devsecops-app:latest

    # PUSH IMAGE
    - name: Push Docker Image
      run: |
        docker push shreyashishree17/flask-devsecops-app:latest

    # DEPLOY TO DEV
    - name: Deploy to Dev
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USERNAME }}
        key: ${{ secrets.EC2_SSH_KEY }}
        script: |
          docker stop dev-container || true
          docker rm dev-container || true

          docker pull shreyashishree17/flask-devsecops-app:latest

          docker run -d \
          --name dev-container \
          -p 5000:5000 \
          shreyashishree17/flask-devsecops-app:latest

    # DEPLOY TO STAGING
    - name: Deploy to Staging
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USERNAME }}
        key: ${{ secrets.EC2_SSH_KEY }}
        script: |
          docker stop staging-container || true
          docker rm staging-container || true

          docker pull shreyashishree17/flask-devsecops-app:latest

          docker run -d \
          --name staging-container \
          -p 5001:5000 \
          shreyashishree17/flask-devsecops-app:latest

    # DEPLOY TO PRODUCTION
    - name: Deploy to Production
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USERNAME }}
        key: ${{ secrets.EC2_SSH_KEY }}
        script: |
          docker stop prod-container || true
          docker rm prod-container || true

          docker pull shreyashishree17/flask-devsecops-app:latest

          docker run -d \
          --name prod-container \
          -p 5002:5000 \
          shreyashishree17/flask-devsecops-app:latest
